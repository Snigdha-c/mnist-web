<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digit Camera Preprocessing</title>

<style>
body{
    text-align:center;
    font-family:Arial;
}

video{
    width:90%;
    max-width:400px;
    border:2px solid black;
}

canvas{
    border:2px solid black;
    margin-top:10px;
    width:140px;
    height:140px;
    image-rendering: pixelated;
}

button{
    font-size:18px;
    padding:10px 20px;
    margin:10px;
}
</style>
</head>

<body>

<h2>Capture Digit</h2>

<video id="video" autoplay playsinline></video>
<br>

<button id="capture">Capture</button>

<h3>Processed 28×28 Image</h3>

<canvas id="canvas" width="28" height="28"></canvas>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// start camera
navigator.mediaDevices.getUserMedia({
    video:{ facingMode:"environment" }
})
.then(stream=>{
    video.srcObject = stream;
})
.catch(()=>{
    alert("Camera access denied");
});

document.getElementById("capture").onclick = function(){

    const tempCanvas = document.createElement("canvas");
    tempCanvas.width = video.videoWidth;
    tempCanvas.height = video.videoHeight;

    const tempCtx = tempCanvas.getContext("2d");

    tempCtx.drawImage(video,0,0);

    const imgData = tempCtx.getImageData(0,0,tempCanvas.width,tempCanvas.height);
    const data = imgData.data;

    let minX=tempCanvas.width;
    let minY=tempCanvas.height;
    let maxX=0;
    let maxY=0;

    for(let y=0;y<tempCanvas.height;y++){
        for(let x=0;x<tempCanvas.width;x++){

            const i=(y*tempCanvas.width+x)*4;

            const gray=(data[i]+data[i+1]+data[i+2])/3;

            if(gray<200){

                if(x<minX) minX=x;
                if(x>maxX) maxX=x;
                if(y<minY) minY=y;
                if(y>maxY) maxY=y;

            }
        }
    }

    if(maxX<=minX || maxY<=minY){
        return;
    }

    const width=maxX-minX;
    const height=maxY-minY;

    const cropCanvas=document.createElement("canvas");
    cropCanvas.width=width;
    cropCanvas.height=height;

    const cropCtx=cropCanvas.getContext("2d");

    cropCtx.drawImage(
        tempCanvas,
        minX,minY,width,height,
        0,0,width,height
    );

    ctx.drawImage(cropCanvas,0,0,28,28);

    const processed=ctx.getImageData(0,0,28,28);
    const pdata=processed.data;

    for(let i=0;i<28*28;i++){

        const r=pdata[i*4];
        const g=pdata[i*4+1];
        const b=pdata[i*4+2];

        const gray=(r+g+b)/3;

        const val=255-gray;

        pdata[i*4]=val;
        pdata[i*4+1]=val;
        pdata[i*4+2]=val;
    }

    ctx.putImageData(processed,0,0);

};

</script>

</body>
</html>
